data:
  data_path: "/data/WIKI_CN/wikipedia-zh-cn-20260501.json"
  test_size: 0.1
  seed: 42
  context_length: 512
  num_proc: 4

model:
  model_name: "Qwen/Qwen2-0.5B"
  cache_dir: "./cache"
  vocab_size: 151936
  hidden_size: 512
  intermediate_size: 2048
  num_attention_heads: 8
  num_hidden_layers: 12
  max_position_embeddings: 512
  bos_token_id: 151643
  eos_token_id: 151643

training:
  output_dir: "./checkpoints"
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 32
  eval_strategy: "steps"
  eval_steps: 500
  logging_steps: 50
  gradient_accumulation_steps: 8
  num_train_epochs: 2
  weight_decay: 0.1
  warmup_steps: 200
  optim: "adamw_torch"
  lr_scheduler_type: "cosine"
  learning_rate: 5e-4
  save_steps: 500
  save_total_limit: 10
  bf16: true
  fp16: false
  seed: 42
  dataloader_num_workers: 4
  remove_unused_columns: false
  report_to: "none"

swanlab:
  enabled: true
  project_name: "WikiLLM"
  experiment_name: null
  description: "Qwen2-0.5B Pretraining"
